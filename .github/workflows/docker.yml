name: Deploy to Cloud Run

on:
  push:
    branches: [main]

permissions:
  contents: read
  id-token: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: projects/983595415114/locations/global/workloadIdentityPools/github-pool/providers/github-provider
          service_account: github-deployer@studio-2972039985-2dbb1.iam.gserviceaccount.com

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      - name: Deploy to Cloud Run
        uses: google-github-actions/deploy-cloudrun@v2
        with:
          service: blueprint-maker
          region: us-central1
          project_id: studio-2972039985-2dbb1
          source: .
          env_vars: |
            OPENROUTER_API_KEY=${{ secrets.OPENROUTER_API_KEY }}
          flags: --memory=2Gi --cpu=2 --timeout=3600 --concurrency=10 --port=8770 --allow-unauthenticated
